name: Superior Energy Services
description: >-
  Superior Energy Services is a leading provider of specialized oilfield services
  and equipment for oil and gas exploration, production, and well services. The company
  operates a portfolio of global brands providing drilling equipment rentals, completion
  tools, well intervention, and production services across 47 countries. Superior leverages
  digital transformation technologies including SAP, Azure, and field data platforms to
  deliver integrated wellbore technology and wellsite solutions.
